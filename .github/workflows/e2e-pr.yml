name: E2E Tests (PR)

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-pr:
    name: E2E Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      PLAYWRIGHT_TEST_MODE: 'true'
      NEXT_PUBLIC_PLAYWRIGHT_TEST_MODE: 'true'
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      OPENWEATHER_API_KEY: placeholder-key
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run PR E2E suite (Chromium)
        run: npx playwright test --project=chromium --reporter=github,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-pr-${{ github.run_id }}
          path: test-results/
          retention-days: 14
