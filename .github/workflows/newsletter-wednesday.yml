name: Newsletter (Wednesday Topic Deep-Dive)

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesdays at 12:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate but do not write the post or open a PR'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate Wednesday post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSLETTER_MODEL: ${{ vars.NEWSLETTER_MODEL || 'claude-sonnet-4-6' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/newsletter/index.ts --cadence wednesday --dry-run
          else
            npx tsx scripts/newsletter/index.ts --cadence wednesday
          fi

      - name: Detect new post
        id: check
        if: ${{ inputs.dry_run != true }}
        run: |
          if git status --porcelain content/blog/ | grep -q '^??\|^ M\|^M '; then
            echo "new_post=true" >> "$GITHUB_OUTPUT"
            echo "new_file=$(git status --porcelain content/blog/ | awk '{print $2}' | head -1)" >> "$GITHUB_OUTPUT"
          else
            echo "new_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with the new post
        if: steps.check.outputs.new_post == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_FILE: ${{ steps.check.outputs.new_file }}
        run: |
          BRANCH_DATE=$(date -u +%Y-%m-%d)
          BRANCH_NAME="blog/wed-${BRANCH_DATE}-${GITHUB_RUN_ID}"

          git config user.name "16bitbot"
          git config user.email "16bitbot@16bitweather.co"

          git checkout -b "$BRANCH_NAME"
          git add content/blog/

          TITLE=$(grep -m1 '^title:' "$NEW_FILE" 2>/dev/null | sed 's/title: "\?//;s/"\?$//')

          git commit -m "blog: ${TITLE:-Wednesday topic deep-dive}

          Auto-generated by the newsletter pipeline (Wednesday cadence).

          Co-Authored-By: 16bitbot <16bitbot@16bitweather.co>"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "blog: ${TITLE:-Wednesday deep-dive ${BRANCH_DATE}}" \
            --body "Auto-generated Wednesday topic deep-dive.

          **Post:** \`${NEW_FILE}\`

          Generated by \`scripts/newsletter/index.ts --cadence wednesday\`. See frontmatter for run metadata (topic, similarity score, key phrases, model used). Review voice and factual claims before merging." \
            --base main \
            --head "$BRANCH_NAME"
