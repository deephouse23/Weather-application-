name: Security Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0' # Run at 01:30 UTC every Sunday

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
        continue-on-error: false

      - name: Check for common secret patterns
        run: |
          echo "Checking for hardcoded secrets in tracked files..."

          # Patterns that should never appear in code
          PATTERNS=(
            'sntryu_[a-zA-Z0-9]+'
            'sntrys_[a-zA-Z0-9]+'
            'sk_live_[a-zA-Z0-9]+'
            'sk_test_[a-zA-Z0-9]+'
            'ghp_[a-zA-Z0-9]+'
            'gho_[a-zA-Z0-9]+'
            'github_pat_[a-zA-Z0-9]+'
            'xox[baprs]-[a-zA-Z0-9-]+'
            'AKIA[A-Z0-9]{16}'
          )

          FOUND_SECRETS=0
          for pattern in "${PATTERNS[@]}"; do
            if git grep -nE "$pattern" -- ':!*.example' ':!.gitignore' 2>/dev/null; then
              echo "::error::Found potential secret matching pattern: $pattern"
              FOUND_SECRETS=1
            fi
          done

          if [ $FOUND_SECRETS -eq 1 ]; then
            echo "::error::Secrets detected! Please remove them before merging."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"

  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: none
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        # Keep category stable across branches so code scanning can compare against main
        category: /language:javascript-typescript

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
