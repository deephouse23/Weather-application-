name: Blog Post Generator (LEGACY — superseded by newsletter-wednesday.yml + newsletter-sunday.yml)

# Schedule disabled. Newsletter pipeline (scripts/newsletter/) replaces this.
# This workflow is kept for one rollback week, then deleted along with
# scripts/generate-blog-post.legacy.ts.
on:
  workflow_dispatch: {}     # Manual trigger only — kept as a rollback option

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-blog-post.legacy.ts

      - name: Check for new posts
        id: check
        run: |
          if git status --porcelain content/blog/ | grep -q '^??\|^ M\|^M '; then
            echo "new_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with new blog post
        if: steps.check.outputs.new_post == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_DATE=$(date -u +%Y-%m-%d)
          BRANCH_NAME="blog/weekly-${BRANCH_DATE}-${GITHUB_RUN_ID}"

          git config user.name "16bitbot"
          git config user.email "16bitbot@16bitweather.co"

          git checkout -b "$BRANCH_NAME"
          git add content/blog/

          NEW_FILE=$(git status --porcelain content/blog/ | awk '{print $2}' | head -1)
          TITLE=$(grep -m1 '^title:' "$NEW_FILE" 2>/dev/null | sed 's/title: "//;s/"$//')

          git commit -m "blog: ${TITLE:-new weekly dispatch}

          Auto-generated by 16bitbot weekly blog pipeline.

          Co-Authored-By: 16bitbot <16bitbot@16bitweather.co>"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "blog: ${TITLE:-Weekly dispatch ${BRANCH_DATE}}" \
            --body "Auto-generated weekly blog post by 16bitbot.

          **Post:** \`${NEW_FILE}\`

          Please review before merging." \
            --base main \
            --head "$BRANCH_NAME"
